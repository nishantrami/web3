<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Feane Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-container we">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <a href="index.html">Fea<span>ne</span></a>
                </div>
                <h1>Create Account</h1>
                <p>Join our food community</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Register <i class="fas fa-user-plus"></i></button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const inputs = e.target.querySelectorAll('.form-control');
            const name = inputs[0].value;
            const email = inputs[1].value;
            const password = inputs[2].value;
            
            const result = auth.register(name, email, password);
            if (result.success) {
                showToast("Registration successful! Please login.");
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showToast(result.message);
            }
        });
    </script>
</body>
</html>
