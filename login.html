<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Feane Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-container we">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <a href="index.html">Fea<span>ne</span></a>
                </div>
                <h1>Welcome Back</h1>
                <p>Login to your account</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Login Now <i class="fas fa-sign-in-alt"></i></button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register</a></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const password = e.target.querySelector('input[type="password"]').value;
            
            // Simplified for demo: if user types 123 for admin password, let it pass
            const passToCheck = password === '123' ? 'admin123' : password;
            
            const result = auth.login(email, passToCheck);
            if (result.success) {
                if (result.user.role === 'admin') {
                    showToast("Access Denied: Please use the Admin Portal.");
                    auth.logout(); // Immediate logout for admin on user page
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                showToast(result.message);
            }
        });
    </script>
</body>
</html>
