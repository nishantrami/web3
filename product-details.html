<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Feane Restaurant</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-page {
            padding-top: 150px;
            padding-bottom: 100px;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, rgba(251, 191, 36, 0.05) 0%, transparent 50%);
        }

        .details-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .product-visual {
            background: var(--bg-surface);
            border-radius: 40px;
            padding: 60px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-visual::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .product-visual img {
            max-width: 85%;
            z-index: 2;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
            animation: float 4s ease-in-out infinite;
        }

        .product-info h1 {
            font-size: 4rem;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .product-info .category-tag {
            background: var(--primary);
            color: var(--bg-dark);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        .product-info .price-tag {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 30px;
            font-family: 'Outfit', sans-serif;
        }

        .product-info .desc {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .spec-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .spec-item i {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .spec-item label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
        }

        .spec-item span {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 20px;
        }

        .btn-large {
            padding: 20px 40px;
            font-size: 1.1rem;
            border-radius: 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 992px) {
            .details-container {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
            }

            .product-info h1 {
                font-size: 3rem;
            }

            .action-btns {
                justify-content: center;
            }

            .details-page {
                padding-top: 120px;
            }
        }

        @media (max-width: 576px) {
            .product-info h1 {
                font-size: 2.5rem;
            }

            .specs-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .action-btns {
                flex-direction: column;
                width: 100%;
            }

            .btn-large {
                width: 100%;
            }

            .product-visual {
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Header Start -->
    <header id="header we">
        <div class="container">
            <nav class="nav-content">
                <div class="logo">
                    <a href="index.html">Fea<span>ne</span></a>
                </div>
                <ul class="nav-links" id="navLinks">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html" class="active">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="booking.html">Book Table</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li class="show-mobile"><a href="menu.html" class="mobile-order-btn">Order Online</a></li>
                </ul>
                <div class="nav-extra">
                    <div id="authLinks" class="auth-links"></div>
                    <div class="cart-toggle" onclick="window.location.href='checkout.html'">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </div>
                    <a href="menu.html" class="nav-cta show-desktop">Order Online</a>
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="details-page we">
        <div class="container">
            <div id="productDetails" class="details-container">
                <!-- Dynamic Content -->
                <div class="loading">Loading product details...</div>
            </div>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/menuData.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (!productId) {
                window.location.href = 'index.html';
                return;
            }

            const menu = menuManager.getMenu();
            const product = menu.find(p => p.id == productId);

            if (!product) {
                document.getElementById('productDetails').innerHTML = '<h1>Product not found</h1>';
                return;
            }

            // Sync Header
            updateHeaderAuth();
            updateBadge();

            // Render Details
            const container = document.getElementById('productDetails');
            
            // Generate some random specs for "Proper" look
            const times = ['10-15 Min', '15-20 Min', '20-25 Min', '5-10 Min'];
            const cals = ['320 kcal', '450 kcal', '580 kcal', '290 kcal', '610 kcal'];
            const ratings = ['4.7', '4.8', '4.9', '4.5', '4.6'];
            
            const time = times[product.id % times.length];
            const cal = cals[product.id % cals.length];
            const rating = ratings[product.id % ratings.length];

            container.innerHTML = `
                <div class="product-visual">
                    <img src="${product.img}" alt="${product.name}">
                </div>
                <div class="product-info">
                    <span class="category-tag">${product.category}</span>
                    <h1>${product.name}</h1>
                    <div class="price-tag">₹${product.price}</div>
                    <p class="desc">${product.description} Crafted with the freshest ingredients and a secret spice blend that makes every bite unforgettable.</p>
                    
                    <div class="specs-grid">
                        <div class="spec-item">
                            <i class="fas fa-clock"></i>
                            <label>Prep Time</label>
                            <span>${time}</span>
                        </div>
                        <div class="spec-item">
                            <i class="fas fa-fire"></i>
                            <label>Calories</label>
                            <span>${cal}</span>
                        </div>
                        <div class="spec-item">
                            <i class="fas fa-star"></i>
                            <label>Rating</label>
                            <span>${rating}</span>
                        </div>
                    </div>

                    <div class="action-btns">
                        <button class="btn btn-primary btn-large" onclick="addToCartFromData('${product.name}', ${product.price}, '${product.img}')">
                            Add to Cart <i class="fas fa-shopping-cart"></i>
                        </button>
                        <button class="btn btn-outline btn-large" onclick="window.location.href='checkout.html'">
                            Checkout Now
                        </button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
