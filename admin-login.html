<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Feane Restaurant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-card {
            border-top: 5px solid #ffbe33;
        }
        .admin-badge {
            background: #ffbe33;
            color: #222;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-container we">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <a href="index.html">Fea<span>ne</span></a>
                </div>
                <div class="admin-badge">Admin Portal</div>
                <h1>System Access</h1>
                <p>Authorize to manage restaurant operations</p>
            </div>
            
            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label>Admin ID / Email</label>
                    <input type="email" class="form-control" placeholder="admin@feane.com" required>
                </div>
                <div class="form-group">
                    <label>Security Key</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Authenticate <i class="fas fa-shield-alt"></i></button>
            </form>
            
            <div class="auth-footer">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const password = e.target.querySelector('input[type="password"]').value;
            
            // Fixed credentials for admin from auth.js logic
            const result = auth.login(email, password === '123' ? 'admin123' : password);
            
            if (result.success && result.user.role === 'admin') {
                window.location.href = 'dashboard.html';
            } else if (result.success) {
                showToast("Access Denied: Not an admin account.");
                setTimeout(() => auth.logout(), 2000);
            } else {
                showToast("Invalid Admin Credentials");
            }
        });
    </script>
</body>
</html>
